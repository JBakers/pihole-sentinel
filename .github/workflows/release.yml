# Automatic release on merge to main
#
# Triggers when code is pushed/merged to the main branch.
# Reads VERSION file, creates a git tag, and publishes a GitHub Release
# with a clean tarball (export-ignore files excluded).
name: Release
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
      - name: Create clean tarballs
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          # git archive respects .gitattributes export-ignore
          # Versioned tarball (for archival)
          git archive --format=tar.gz --prefix=pihole-sentinel-${{ steps.version.outputs.version }}/ \
            -o pihole-sentinel-${{ steps.version.outputs.version }}.tar.gz HEAD
          # Fixed-name tarball (for stable download URL)
          git archive --format=tar.gz --prefix=pihole-sentinel/ \
            -o pihole-sentinel.tar.gz HEAD
      - name: Determine pre-release
        if: steps.tag_check.outputs.exists == 'false'
        id: prerelease
        run: |
          if echo "${{ steps.version.outputs.version }}" | grep -q "beta"; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          name: "Pi-hole Sentinel ${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            pihole-sentinel-${{ steps.version.outputs.version }}.tar.gz
            pihole-sentinel.tar.gz
