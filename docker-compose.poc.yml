networks:
  poc-net:
    ipam:
      config:
        - subnet: 172.50.0.0/24

services:
  # ── Node 1: Pi-hole + Sentinel Node ──────────────────────
  pihole-1:
    build: docker/mock-pihole
    container_name: poc-pihole-1
    networks:
      poc-net:
        ipv4_address: 172.50.0.10
    environment:
      PIHOLE_NAME: "Pi-hole 1"
      PIHOLE_PASSWORD: testpass123
      DHCP_ENABLED: "true"
      IS_PRIMARY: "true"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/api/version" ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s

  node-1:
    build: docker/sentinel-node
    container_name: poc-node-1
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
    networks:
      poc-net:
        ipv4_address: 172.50.0.20
    environment:
      NODE_NAME: "node-1"
      NODE_ROLE: "primary"
      KEEPALIVED_STATE: MASTER
      KEEPALIVED_PRIORITY: "102"
      KEEPALIVED_INTERFACE: eth0
      KEEPALIVED_ROUTER_ID: "51"
      KEEPALIVED_AUTH_PASS: secret
      VIP_IP: "172.50.0.100"
      PIHOLE_HOST: "172.50.0.10"
      PIHOLE_WEB_PORT: "80"
      PIHOLE_PASSWORD: testpass123
      SYNC_TOKEN: test-sync-token-12345
      SYNC_PEERS: "172.50.0.21"
    ports:
      - "5001:5000"
    depends_on:
      pihole-1:
        condition: service_healthy

  # ── Node 2: Pi-hole + Sentinel Node ──────────────────────
  pihole-2:
    build: docker/mock-pihole
    container_name: poc-pihole-2
    networks:
      poc-net:
        ipv4_address: 172.50.0.11
    environment:
      PIHOLE_NAME: "Pi-hole 2"
      PIHOLE_PASSWORD: testpass123
      DHCP_ENABLED: "false"
      IS_PRIMARY: "false"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/api/version" ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s

  node-2:
    build: docker/sentinel-node
    container_name: poc-node-2
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
    networks:
      poc-net:
        ipv4_address: 172.50.0.21
    environment:
      NODE_NAME: "node-2"
      NODE_ROLE: "backup"
      KEEPALIVED_STATE: BACKUP
      KEEPALIVED_PRIORITY: "101"
      KEEPALIVED_INTERFACE: eth0
      KEEPALIVED_ROUTER_ID: "51"
      KEEPALIVED_AUTH_PASS: secret
      VIP_IP: "172.50.0.100"
      PIHOLE_HOST: "172.50.0.11"
      PIHOLE_WEB_PORT: "80"
      PIHOLE_PASSWORD: testpass123
      SYNC_TOKEN: test-sync-token-12345
      SYNC_PEERS: "172.50.0.20"
    ports:
      - "5002:5000"
    depends_on:
      pihole-2:
        condition: service_healthy
