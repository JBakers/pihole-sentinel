<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative glow orbs -->
  <circle cx="100" cy="320" r="200" fill="#667eea" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1180" cy="320" r="200" fill="#764ba2" opacity="0.06" filter="url(#glow)"/>

  <!-- ===== Header bar (dashboard style) ===== -->
  <g transform="translate(50, 30)" filter="url(#cardShadow)">
    <rect width="1180" height="70" rx="16" fill="white" opacity="0.07"/>
    <rect width="1180" height="70" rx="16" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>

    <!-- Logo -->
    <g transform="translate(20, 11)">
      <circle cx="24" cy="24" r="24" fill="url(#accentGrad)"/>
      <path d="M 24 10 L 18 18 L 21 18 L 21 28 L 18 28 L 24 36 L 30 28 L 27 28 L 27 18 L 30 18 Z" fill="white" opacity="0.95"/>
      <circle cx="12" cy="14" r="2.5" fill="white" opacity="0.6"/>
      <circle cx="36" cy="14" r="2.5" fill="white" opacity="0.6"/>
      <circle cx="12" cy="34" r="2.5" fill="white" opacity="0.6"/>
      <circle cx="36" cy="34" r="2.5" fill="white" opacity="0.6"/>
    </g>

    <!-- Title -->
    <text x="78" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white">Pi-hole Sentinel</text>
    <text x="78" y="53" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" opacity="0.5">v0.14.0</text>

    <!-- Header pills -->
    <g transform="translate(680, 15)">
      <rect width="100" height="40" rx="20" fill="white" opacity="0.06" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
      <text x="50" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.5" font-weight="500">VIP</text>
      <text x="50" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">10.0.0.100</text>
    </g>
    <g transform="translate(800, 15)">
      <rect width="90" height="40" rx="20" fill="white" opacity="0.06" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
      <text x="45" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.5" font-weight="500">LEASES</text>
      <text x="45" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">24</text>
    </g>
    <g transform="translate(910, 15)">
      <rect width="120" height="40" rx="20" fill="white" opacity="0.06" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
      <text x="60" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.5" font-weight="500">UPDATED</text>
      <text x="60" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">12:34:56</text>
    </g>

    <!-- Settings icon -->
    <circle cx="1120" cy="35" r="20" fill="url(#accentGrad)"/>
    <circle cx="1120" cy="35" r="6" fill="none" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- ===== Node cards ===== -->
  <!-- Primary Pi-hole -->
  <g transform="translate(50, 120)" filter="url(#cardShadow)">
    <rect width="575" height="230" rx="16" fill="white" opacity="0.07"/>
    <rect width="575" height="230" rx="16" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
    <!-- Green left accent for MASTER -->
    <rect x="0" y="0" width="4" height="230" rx="2" fill="#10b981"/>

    <text x="24" y="36" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="white">Primary Pi-hole</text>
    <text x="24" y="56" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.4">10.0.0.10</text>

    <!-- MASTER badge -->
    <rect x="480" y="16" width="76" height="28" rx="14" fill="#10b981" opacity="0.15"/>
    <text x="518" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#10b981">MASTER</text>

    <!-- Status dots -->
    <g transform="translate(24, 76)">
      <circle cx="6" cy="6" r="5" fill="#10b981"/><text x="18" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">Online</text>
      <circle cx="146" cy="6" r="5" fill="#10b981"/><text x="158" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">FTL Running</text>
    </g>
    <g transform="translate(24, 102)">
      <circle cx="6" cy="6" r="5" fill="#10b981"/><text x="18" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">VIP Assigned</text>
      <circle cx="146" cy="6" r="5" fill="#10b981"/><text x="158" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">DNS Resolving</text>
    </g>
    <g transform="translate(24, 128)">
      <circle cx="6" cy="6" r="5" fill="#10b981"/><text x="18" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">DHCP Active</text>
    </g>

    <!-- Stats bar -->
    <line x1="24" y1="152" x2="551" y2="152" stroke="white" stroke-width="1" opacity="0.06"/>
    <g transform="translate(24, 168)">
      <text x="0" y="22" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white">32,847</text>
      <text x="0" y="38" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.4" text-transform="uppercase">Queries</text>
      <text x="150" y="22" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white">4,218</text>
      <text x="150" y="38" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.4">Blocked (12.8%)</text>
      <text x="330" y="22" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white">18</text>
      <text x="330" y="38" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.4">Clients</text>
    </g>
  </g>

  <!-- Secondary Pi-hole -->
  <g transform="translate(655, 120)" filter="url(#cardShadow)">
    <rect width="575" height="230" rx="16" fill="white" opacity="0.07"/>
    <rect width="575" height="230" rx="16" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
    <!-- Blue left accent for BACKUP -->
    <rect x="0" y="0" width="4" height="230" rx="2" fill="#6366f1"/>

    <text x="24" y="36" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="white">Secondary Pi-hole</text>
    <text x="24" y="56" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.4">10.0.0.11</text>

    <!-- BACKUP badge -->
    <rect x="480" y="16" width="76" height="28" rx="14" fill="#6366f1" opacity="0.15"/>
    <text x="518" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#6366f1">BACKUP</text>

    <!-- Status dots -->
    <g transform="translate(24, 76)">
      <circle cx="6" cy="6" r="5" fill="#10b981"/><text x="18" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">Online</text>
      <circle cx="146" cy="6" r="5" fill="#10b981"/><text x="158" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">FTL Running</text>
    </g>
    <g transform="translate(24, 102)">
      <circle cx="6" cy="6" r="5" fill="#10b981"/><text x="18" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">VIP —</text>
      <circle cx="146" cy="6" r="5" fill="#10b981"/><text x="158" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">DNS Resolving</text>
    </g>
    <g transform="translate(24, 128)">
      <circle cx="6" cy="6" r="5" fill="#6366f1"/><text x="18" y="11" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.8">DHCP Standby</text>
    </g>

    <!-- Stats bar -->
    <line x1="24" y1="152" x2="551" y2="152" stroke="white" stroke-width="1" opacity="0.06"/>
    <g transform="translate(24, 168)">
      <text x="0" y="22" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white">31,204</text>
      <text x="0" y="38" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.4">Queries</text>
      <text x="150" y="22" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white">3,896</text>
      <text x="150" y="38" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.4">Blocked (12.5%)</text>
      <text x="330" y="22" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white">18</text>
      <text x="330" y="38" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.4">Clients</text>
    </g>
  </g>

  <!-- ===== Chart card (simplified) ===== -->
  <g transform="translate(50, 370)" filter="url(#cardShadow)">
    <rect width="780" height="240" rx="16" fill="white" opacity="0.07"/>
    <rect width="780" height="240" rx="16" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>

    <text x="24" y="36" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="white">Master State History</text>

    <!-- Time buttons -->
    <g transform="translate(480, 14)">
      <rect x="0" y="0" width="40" height="28" rx="6" fill="white" opacity="0.05"/>
      <text x="20" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.5">1h</text>
      <rect x="48" y="0" width="40" height="28" rx="6" fill="white" opacity="0.05"/>
      <text x="68" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.5">6h</text>
      <rect x="96" y="0" width="44" height="28" rx="6" fill="url(#accentGrad)"/>
      <text x="118" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" font-weight="600">24h</text>
      <rect x="148" y="0" width="40" height="28" rx="6" fill="white" opacity="0.05"/>
      <text x="168" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.5">7d</text>
      <rect x="196" y="0" width="44" height="28" rx="6" fill="white" opacity="0.05"/>
      <text x="218" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.5">30d</text>
    </g>

    <!-- Fake chart: green background band + DHCP line -->
    <rect x="24" y="60" width="732" height="155" rx="8" fill="#10b981" opacity="0.08"/>

    <!-- Y axis labels -->
    <text x="20" y="80" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.3">24</text>
    <text x="20" y="120" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.3">16</text>
    <text x="20" y="160" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.3">8</text>
    <text x="20" y="200" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.3">0</text>

    <!-- DHCP line chart (smooth curve) -->
    <polyline points="40,120 80,118 120,115 160,112 200,114 240,110 280,108 320,106 360,112 400,115 440,110 480,108 520,105 560,108 600,112 640,108 680,106 720,104 740,106"
              fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Fill under curve -->
    <polygon points="40,120 80,118 120,115 160,112 200,114 240,110 280,108 320,106 360,112 400,115 440,110 480,108 520,105 560,108 600,112 640,108 680,106 720,104 740,106 740,210 40,210"
             fill="#6366f1" opacity="0.06"/>

    <!-- Legend -->
    <rect x="24" y="222" width="12" height="8" rx="2" fill="#10b981" opacity="0.3"/>
    <text x="42" y="230" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.5">Primary is MASTER</text>
    <line x1="200" y1="226" x2="216" y2="226" stroke="#6366f1" stroke-width="2"/>
    <text x="222" y="230" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.5">DHCP Leases</text>
  </g>

  <!-- ===== Feature highlights (right side) ===== -->
  <g transform="translate(860, 370)" filter="url(#cardShadow)">
    <rect width="370" height="240" rx="16" fill="white" opacity="0.07"/>
    <rect width="370" height="240" rx="16" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>

    <text x="24" y="36" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="white">High Availability for Pi-hole</text>

    <g transform="translate(24, 60)">
      <circle cx="8" cy="8" r="8" fill="#10b981" opacity="0.15"/>
      <circle cx="8" cy="8" r="3" fill="#10b981"/>
      <text x="24" y="13" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.8">Automatic DNS Failover (VRRP)</text>

      <circle cx="8" cy="42" r="8" fill="#10b981" opacity="0.15"/>
      <circle cx="8" cy="42" r="3" fill="#10b981"/>
      <text x="24" y="47" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.8">Real-time Monitoring Dashboard</text>

      <circle cx="8" cy="76" r="8" fill="#10b981" opacity="0.15"/>
      <circle cx="8" cy="76" r="3" fill="#10b981"/>
      <text x="24" y="81" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.8">DHCP Failover with Lease Sync</text>

      <circle cx="8" cy="110" r="8" fill="#10b981" opacity="0.15"/>
      <circle cx="8" cy="110" r="3" fill="#10b981"/>
      <text x="24" y="115" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.8">Multi-channel Notifications</text>

      <circle cx="8" cy="144" r="8" fill="#10b981" opacity="0.15"/>
      <circle cx="8" cy="144" r="3" fill="#10b981"/>
      <text x="24" y="149" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.8">Pi-hole v6 + Raspberry Pi</text>
    </g>
  </g>

  <!-- Footer: version + GitHub -->
  <text x="50" y="632" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.25">
    Pi-hole Sentinel v0.14.0 — GPLv3 — github.com/JBakers/pihole-sentinel
  </text>
</svg>
